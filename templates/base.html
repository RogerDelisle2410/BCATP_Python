<!DOCTYPE html> 

<html>
<head>
    <style>
            /* ---------------------------------------------------------
               GLOBAL LAYOUT
        --------------------------------------------------------- */

            body {
                font-family: Arial, sans-serif;
                background: #f7f7f7;
                margin: 0;
                padding: 20px;
            }

            .container {
                width: 100%;
                max-width: 1100px;
                background: white;
                padding: 11px 20px 10px 20px;
                box-shadow: 0 0 8px rgba(0,0,0,0.1);
                border-radius: 6px;
                margin-top: 10px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 10px;
            }

            .page-wrapper {
                display: flex;
                justify-content: center;
                align-items: flex-start; /* ← THIS FIXES IT */
                width: 100%;
            }
            /* ---------------------------------------------------------
               PAGE HEADER
               --------------------------------------------------------- */
            .page-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 90px;
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            .page-header h1 {
                margin: 0;
                font-weight: 600;
                white-space: nowrap;
            }

            /* ---------------------------------------------------------
               SEARCH BOX
               --------------------------------------------------------- */
            .search-wrapper {
                position: relative;
                display: inline-block;
            }

            .search-box,
            .global-search-box {
                width: 160px;
                padding: 4px 30px 4px 8px;
                font-size: 14px;
                height: 28px;
                box-sizing: border-box;
                margin-right: 10px;
            }

            .clear-btn {
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 20px;
                color: red;
                cursor: pointer;
                user-select: none;
                font-weight: 900;
                line-height: 1;
            }

            /* ---------------------------------------------------------
               TABS
               --------------------------------------------------------- */
        .tabs {
            margin-top: 20px;
            display: flex; /* enable flexbox */
            justify-content: center; /* center the tabs */
            flex-wrap: wrap; /* allow wrapping on smaller screens */
            gap: 8px; /* optional: clean spacing */
        }


            .tab,
            .tab:link,
            .tab:visited,
            .tab:hover,
            .tab:active {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                height: 32px;
                line-height: 32px;
                padding: 0 12px;
                background: #e6e6e6;
                border-radius: 6px;
                text-decoration: none;
                color: #000;
                font-weight: bold;
                box-sizing: border-box;
            }

                .tab:hover {
                    background: #d0d0d0;
                }

                .tab.active {
                    background: #0078d4;
                    color: white;
                }

            /* ---------------------------------------------------------
               TABLE
               --------------------------------------------------------- */
            table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
                word-wrap: break-word;
                margin-bottom: 20px;
            }

            th, td {
                border: 1px solid #ddd;
                padding: 2px 4px;
                font-size: 13px;
                line-height: 1.5;
            }

            th {
                background: #f0f0f0;
                font-size: 12px;
                font-weight: 600;
                padding: 3px 4px;
            }

            tr:nth-child(even) {
                background: #fafafa;
            }

            tr:hover {
                background: #eef5ff;
            }

            th.actions, td.actions {
                width: 200px;
                text-align: center;
            }

            .action-buttons {
                display: flex;
                justify-content: center;
                gap: 6px;
            }

                .action-buttons .action-btn {
                    padding: 2px 6px;
                    font-size: 12px;
                }

            /* ---------------------------------------------------------
               BUTTONS
               --------------------------------------------------------- */
            .add-btn,
            .edit-btn,
            .delete-btn,
            .map-btn {
                padding: 6px 14px;
                border-radius: 4px;
                font-size: 14px;
                font-weight: bold;
                cursor: pointer;
                border: none;
            }

            .add-btn {
                background: #0078d4;
                color: white;
            }

                .add-btn:hover {
                    background: #005fa3;
                }

            .edit-btn {
                background: #0078d4;
                color: white;
            }

                .edit-btn:hover {
                    background: #005fa3;
                } 

            .delete-btn {
                background: #d9534f;
                color: white;
            }

                .delete-btn:hover {
                    background: #b52b27;
                }

            .map-btn {
                background: #28a745;
                color: white;
            }

                .map-btn:hover {
                    background: #1e7e34;
                }

            /* ---------------------------------------------------------
               MAP MODAL
               --------------------------------------------------------- */
            .modal {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: rgba(0,0,0,0.6);
            }

            .modal-content {
                background: white;
                width: 80%;
                max-width: 900px;
                height: 80%;
                margin: 60px auto;
                padding: 20px;
                border-radius: 8px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .map-wrapper {
                flex: 1;
                width: 100%;
                border-radius: 6px;
                overflow: hidden;
                position: relative;
            }

            .map-frame {
                width: 100%;
                height: 100%;
                border: 0;
            }

            /* ---------------------------------------------------------
               EDIT MODAL
               --------------------------------------------------------- */
            .modal-edit {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 99999;
                background: rgba(0,0,0,0.45);
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .edit-modal {
                width: 340px;
                background: #ffffff;
                border-radius: 10px;
                padding: 20px 22px;
                box-shadow: 0 8px 28px rgba(0,0,0,0.28);
                border: 1px solid #dcdcdc;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

                .edit-modal h2 {
                    margin: 0;
                    font-size: 17px;
                    font-weight: 600;
                    padding-bottom: 8px;
                    border-bottom: 1px solid #e5e5e5;
                    text-align: center;
                }

            .edit-form {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .edit-row {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

                .edit-row label {
                    font-size: 13px;
                    font-weight: 600;
                    color: #444;
                }

                .edit-row input {
                    padding: 7px 9px;
                    font-size: 14px;
                    border: 1px solid #bfbfbf;
                    border-radius: 5px;
                    background: #fafafa;
                }

                    .edit-row input:focus {
                        outline: none;
                        border-color: #0078d4;
                        background: #fff;
                    }

            .edit-buttons {
                display: flex;
                justify-content: center;
                gap: 14px;
                margin-top: 6px;
            }

            .modal-edit-btn {
                width: 120px;
                padding: 9px 0;
                font-size: 14px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                background: #0078d4;
                color: white;
                font-weight: bold;
            }

                .modal-edit-btn:hover {
                    background: #005fa3;
                }

            /* ---------------------------------------------------------
               DELETE MODAL
               --------------------------------------------------------- */
            .delete-box {
                width: 320px;
                margin: 150px auto;
                padding: 20px;
                background: white;
                border: 3px solid #d9534f;
                border-radius: 8px;
                text-align: center;
                box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            }

            .delete-buttons {
                display: flex;
                justify-content: center;
                gap: 12px;
                margin-top: 20px;
            }

            /* ---------------------------------------------------------
               LINKS
               --------------------------------------------------------- */
            a {
                color: #0078d4;
                text-decoration: none;
            }

                a:hover {
                    text-decoration: underline;
                }

            .pagination {
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                margin-top: 25px;
                gap: 12px;
            }

            /* ---------------------------------------------------------
               GLOBAL SEARCH MODAL
               --------------------------------------------------------- */
            #globalModal {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: none;
                justify-content: center;
                align-items: center;
                background: rgba(0,0,0,0.45);
                z-index: 9999;
            }

                #globalModal .global-modal-box {
                    background: #fff;
                    width: 360px;
                    max-height: 80vh;
                    border-radius: 10px;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
                }

                #globalModal .global-modal-header {
                    padding: 14px 18px;
                    border-bottom: 1px solid #e5e5e5;
                }

                    #globalModal .global-modal-header h2 {
                        margin: 0;
                        font-size: 18px;
                        font-weight: 600;
                    }

                #globalModal .global-modal-body {
                    padding: 14px 18px;
                    overflow-y: auto;
                    max-height: 60vh;
                }

                #globalModal .global-result {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 6px 0;
                    border-bottom: 1px solid #f0f0f0;
                }

                    #globalModal .global-result:last-child {
                        border-bottom: none;
                    }

                #globalModal .tab-label {
                    font-size: 11px;
                    background: #e8e8e8;
                    padding: 2px 6px;
                    border-radius: 4px;
                    margin-right: 10px;
                }

                #globalModal .global-modal-footer {
                    padding: 12px 18px;
                    border-top: 1px solid #e5e5e5;
                    text-align: right;
                }

                #globalModal .close-btn {
                    padding: 6px 14px;
                    background: #d9534f;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                }

                    #globalModal .close-btn:hover {
                        background: #c9302c;
                    }
        .app-title {
            text-align: center;
            width: 100%;
            margin: 10px 0 0 0;
        }

            .app-title h1 {
                margin: 0;
                font-size: 28px;
                font-weight: 700;
            }
        .action-btn.disabled {
            pointer-events: none;
            color: gray;
            cursor: default;
        }
        button.modal-edit-btn:disabled {
            pointer-events: none !important;
            opacity: 0.5;
            cursor: default !important;
        }


    </style>
    <title>{{ title }}</title>
    <meta charset="UTF-8">
</head>
<body>
    <div class="page-wrapper">
        <div class="container" data-tab="{{ active_tab }}">
            <div class="app-title">
                <h1>Canadian Military Atlas</h1>
                <!--<div class="subtitle">Bases • Airfields • Ports • Historical Defence Networks</div>-->
            </div>
            <div class="tabs">
                <a href="/home" class="tab {% if active_tab == 'home' %}active{% endif %}">HOME</a>
                <a href="/bcatp" class="tab {% if active_tab == 'bcatp' %}active{% endif %}">BCATP</a>
                <a href="/army" class="tab {% if active_tab == 'army' %}active{% endif %}">Army</a>
                <a href="/airforce" class="tab {% if active_tab == 'airforce' %}active{% endif %}">Air Force</a>
                <a href="/navy" class="tab {% if active_tab == 'navy' %}active{% endif %}">Navy</a>
                <a href="/dewline" class="tab {% if active_tab == 'dewline' %}active{% endif %}">Dew Line</a>
                <a href="/midcanada" class="tab {% if active_tab == 'midcanada' %}active{% endif %}">Mid Canada</a>
                <a href="/pinetree" class="tab {% if active_tab == 'pinetree' %}active{% endif %}">Pinetree</a>
                <a href="/defunct" class="tab {% if active_tab == 'defunct' %}active{% endif %}">Defunct</a>
                <a href="/planes" class="tab {% if active_tab == 'planes' %}active{% endif %}">Planes</a>
                <a href="/ships" class="tab {% if active_tab == 'ships' %}active{% endif %}">Ships</a>
                <a href="/tanks" class="tab {% if active_tab == 'tanks' %}active{% endif %}">Tanks</a>

            </div>

            {% block content %}{% endblock %}
            <div id="globalModal">
                <div class="global-modal-box">
                    <div class="global-modal-header">
                        <h2>Global Search Results</h2>
                    </div>

                    <div id="globalModalContent" class="global-modal-body"></div>

                    <div class="global-modal-footer">
                        <button class="close-btn"
                                onclick="document.getElementById('globalModal').style.display='none'">
                            Close
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- ========================= -->
    <!-- ALL SCRIPTS BELOW CONTENT -->
    <!-- ========================= -->

    <script>
        // Map modal and iframe helpers:
        // - openMap(lat, lon): sets coordinates, initializes zoom, loads the map iframe and shows the modal
        // - closeMap(): hides the modal and clears the iframe src to stop loading
        // - loadMap(): updates the iframe src URL based on currentLat/currentLon/currentZoom
        // - zoomIn()/zoomOut(): adjust currentZoom and reload the iframe
        let currentZoom = 14;
        let currentLat = null;
        let currentLon = null;

        function openMap(lat, lon) {
            currentLat = lat;
            currentLon = lon;
            currentZoom = 13;

            loadMap();

            document.getElementById("mapModal").style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function closeMap() {
            document.getElementById("mapModal").style.display = "none";
            document.getElementById("mapFrame").src = "";
            document.body.style.overflow = "auto";
        }

        function loadMap() {
            const url = `https://www.google.com/maps?q=${currentLat},${currentLon}&t=k&z=${currentZoom}&output=embed`;
            document.getElementById("mapFrame").src = url;
        }

        function zoomIn() {
            if (currentZoom < 20) {
                currentZoom++;
                loadMap();
            }
        }

        function zoomOut() {
            if (currentZoom > 1) {
                currentZoom--;
                loadMap();
            }
        }
    </script>

    <script>
        // Universal "Add New" modal helper:
        // - openAddModal(tab): prepares the add form for the given tab, clears fields
        //   and hides longitude/latitude inputs for tabs that don't use them
        function openAddModal(tab) {

            document.getElementById("universalModalTitle").innerText = "Add New";

            document.getElementById("universalForm").action = `/${tab}/add`;

            document.getElementById("u_name").value = "";
            document.getElementById("u_comment").value = "";
            document.getElementById("u_wiki").value = "";
            document.getElementById("u_longitude").value = "";
            document.getElementById("u_latitude").value = "";

            if (tab === "planes" || tab === "ships" || tab === "tanks") {
                document.getElementById("u_longitude").parentElement.style.display = "none";
                document.getElementById("u_latitude").parentElement.style.display = "none";
            } else {
                document.getElementById("u_longitude").parentElement.style.display = "block";
                document.getElementById("u_latitude").parentElement.style.display = "block";
            }

            document.getElementById("universalModal").style.display = "flex";
        }
    </script>

    <script>
        // Edit modal loader and close helper:
        // - openEditModal(url): fetches the edit page, scrapes form values and title,
        //   populates the universal modal fields and opens it
        // - closeUniversalModal(): hides the universal modal
        function openEditModal(url) {
            fetch(url)
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, "text/html");

                    document.getElementById("u_name").value =
                        doc.querySelector("input[name='name']").value;

                    document.getElementById("u_comment").value =
                        doc.querySelector("input[name='comment']").value;

                    document.getElementById("u_wiki").value =
                        doc.querySelector("input[name='wiki']").value;

                    const longField = doc.querySelector("input[name='longitude']");
                    const latField = doc.querySelector("input[name='latitude']");

                    if (longField && latField) {
                        document.getElementById("u_longitude").parentElement.style.display = "block";
                        document.getElementById("u_latitude").parentElement.style.display = "block";

                        document.getElementById("u_longitude").value = longField.value;
                        document.getElementById("u_latitude").value = latField.value;
                    } else {
                        document.getElementById("u_longitude").parentElement.style.display = "none";
                        document.getElementById("u_latitude").parentElement.style.display = "none";
                    }

                    const formAction = doc.querySelector("form").getAttribute("action");
                    document.getElementById("universalForm").action = formAction;

                    const title = doc.querySelector("h2").innerText;
                    document.getElementById("universalModalTitle").innerText = title;

                    document.getElementById("universalModal").style.display = "flex";
                });
        }

        function closeUniversalModal() {
            document.getElementById("universalModal").style.display = "none";
        }
    </script>

    <script>
        // Delete confirmation modal helpers:
        // - confirmDelete(url): stores the delete URL and shows the confirmation modal
        // - event listeners bound on DOMContentLoaded wire the Yes/No buttons
        let deleteUrl = null;

        function confirmDelete(url) {
            deleteUrl = url;
            const modal = document.getElementById("deleteWarning");
            if (modal) {
                modal.style.display = "flex";
            } else {
                console.error("deleteWarning modal not found");
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const deleteYes = document.getElementById("deleteYes");
            const deleteNo = document.getElementById("deleteNo");
            const modal = document.getElementById("deleteWarning");

            console.log("Binding delete handlers:", { deleteYes, deleteNo, modal });

            if (deleteYes) {
                deleteYes.addEventListener("click", function () {
                    if (deleteUrl) {
                        window.location.href = deleteUrl;
                    } else {
                        console.warn("deleteUrl is null when clicking Delete");
                    }
                });
            } else {
                console.error("deleteYes button not found");
            }

            if (deleteNo) {
                deleteNo.addEventListener("click", function () {
                    if (modal) {
                        modal.style.display = "none";
                    }
                    deleteUrl = null;
                });
            } else {
                console.error("deleteNo button not found");
            }
        });

    </script>

    <script>
        // Quick search helper that navigates the current tab with the `starts` query
        // parameter (used to filter rows by starting letters)
        function searchByLetter() {
            const value = document.getElementById("searchBox").value;
            const tab = document.querySelector(".container").getAttribute("data-tab");
            window.location = "/" + tab + "?starts=" + value;
        }
    </script>

    <script>
        // onload handler to focus the main search box and optionally highlight a row
        // - focuses searchBox and moves cursor to end
        // - if `highlight` query arg is present, waits shortly, scrolls the row into
        //   view and briefly highlights it
            window.onload = function () {
    /* Keep cursor in the search box */
    const box = document.getElementById("searchBox");
    if (box) {
        box.focus();
        box.setSelectionRange(box.value.length, box.value.length);
    }

    /* Highlight + scroll (with delay so grids render first) */
    const id = "{{ request.args.get('highlight') }}";
    if (id) {
        setTimeout(() => {
            const row = document.getElementById("row-" + id);
            if (row) {
                row.scrollIntoView({ behavior: "smooth", block: "center" });
                row.style.backgroundColor = "#fffa9e";
                setTimeout(() => row.style.backgroundColor = "", 2000);
            }
        }, 150); // delay ensures grid/table is fully rendered
    }
};
    </script>

    <script>
        // Global search helpers:
        // - globalSearch(): queries the server when user input length >= 3
        // - showGlobalSearchModal(results): renders results into the modal
        // - goToTabItem(tab, id): navigates to a tab and highlights the given id
        function globalSearch() {
            const q = document.getElementById("globalSearchBox").value.trim();
            if (q.length < 3) return;

            fetch(`/global_search?query=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(data => showGlobalSearchModal(data));
        }

        function showGlobalSearchModal(results) {
            let html = "";

            if (results.length === 0) {
                html = "<p>No results found.</p>";
            } else {
                results.forEach(r => {
                    html += `
                                                                     <div class="global-result">
                                                                     <strong>${r.name}</strong>
                                                                     <span class="tab-label">${r.tab.toUpperCase()}</span>
                                                                     <button onclick="openGlobalResult('${r.tab}', ${r.id}, ${r.page})">Open</button>
                                                                     </div>
                                                                     `;
                });
            }

            document.getElementById("globalModalContent").innerHTML = html;
            document.getElementById("globalSearchBox").value = "";
            document.getElementById("globalModal").style.display = "flex";
        }

        function goToTabItem(tab, id) {
            window.location = `/${tab}?highlight=${id}`;
        }
    </script>
    <script>
        // Navigate to a result from the global search modal:
        // - openGlobalResult(tab, id, page): closes modal and navigates to correct page + highlight
        function openGlobalResult(tab, id, page) {

            // Close modal if open
            const modal = document.getElementById("globalModal");
            if (modal) modal.style.display = "none";

            // Build correct URL with page + highlight
            const url = "/" + tab + "?page=" + page + "&highlight=" + id;

            // Navigate
            window.location.href = url;
        }
    </script>
    <!-- DELETE MODAL (ONLY ONE!) -->
    <div id="deleteWarning" class="modal" style="display:none;">
        <div class="delete-box">
            <h3>Confirm Delete</h3>
            <p id="deleteMessage">Are you sure?</p>

            <div class="delete-buttons">
                <button id="deleteYes" class="delete-btn" disabled>Delete</button>
                <button id="deleteNo" class="edit-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- MAP MODAL -->
    <div id="mapModal" class="modal">
        <div class="modal-content">
            <div class="map-wrapper">

                <div class="zoom-controls">
                    <div class="zoom-btn" onclick="zoomIn()">+</div>
                    <div class="zoom-btn" onclick="zoomOut()">−</div>
                </div>

                <iframe id="mapFrame" class="map-frame" loading="lazy"></iframe>
            </div>

            <button id="mapCloseBtn" class="close-button" onclick="closeMap()">Close</button>
        </div>
    </div>

    <!-- EDIT / ADD MODAL -->
    <div id="universalModal" class="modal-edit" style="display:none;">
        <div class="edit-modal">
            <h2 id="universalModalTitle"></h2>

            <form id="universalForm" method="POST" class="edit-form">

                <div class="edit-row">
                    <label>Name:</label>
                    <input type="text" name="name" id="u_name" required>
                </div>

                <div class="edit-row">
                    <label>Longitude:</label>
                    <input type="text" name="longitude" id="u_longitude">
                </div>

                <div class="edit-row">
                    <label>Latitude:</label>
                    <input type="text" name="latitude" id="u_latitude">
                </div>

                <div class="edit-row">
                    <label>Comment:</label>
                    <input type="text" name="comment" id="u_comment">
                </div>

                <div class="edit-row">
                    <label>Wiki:</label>
                    <input type="text" name="wiki" id="u_wiki">
                </div>

                <div class="edit-buttons">
                    <button type="submit" class="modal-edit-btn" disabled>Save</button>
                    <button type="button" class="modal-edit-btn" onclick="closeUniversalModal()">Back</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>

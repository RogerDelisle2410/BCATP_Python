<h2>Edit: {{ row.name }}</h2> 
<form method="POST" action="/{{ active_tab }}/edit/{{ row.id }}" class="edit-form">

    <input type="hidden" name="tab" value="{{ active_tab }}">

    <div class="edit-row">
        <label>Name:</label>
        <input type="text" name="name" value="{{ row.name }}" required>
    </div>

    {% if active_tab not in ["planes", "ships", "tanks"] %}
    <div class="edit-row">
        <label>Longitude:</label>
        <input type="text" name="longitude" value="{{ row.longitude }}" required>
    </div>

    <div class="edit-row">
        <label>Latitude:</label>
        <input type="text" name="latitude" value="{{ row.latitude }}" required>
    </div>
    {% endif %}



    <div class="edit-row">
        <label>Comment:</label>
        <input type="text" name="comment" value="{{ row.comment }}">
    </div>

    <div class="edit-row">
        <label>Wiki:</label>
        <input type="text" name="wiki" value="{{ row.wiki }}">
    </div>

    <div class="edit-buttons">
        <button type="submit" class="edit-btn" disabled>Save</button>
        <button type="button" class="edit-btn" onclick="closeEdit()">Back</button>
    </div>

</form>
